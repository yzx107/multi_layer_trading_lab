app:
  name: multi_layer_trading_lab
  env: ${APP_ENV:dev}
  timezone: Asia/Hong_Kong
  log_level: ${LOG_LEVEL:INFO}

markets:
  primary:
    - HK
    - US
  secondary:
    - CN

holding_horizons:
